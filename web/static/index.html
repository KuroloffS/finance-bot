<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no, viewport-fit=cover">
<title>Финансы</title>
<script src="https://telegram.org/js/telegram-web-app.js"></script>
<style>
:root{
  --bg:#0C0E16; --bg-elev:#10121C; --surface:#161826; --surface-2:#1E2133; --surface-3:#262A40;
  --text:#F2F4FB; --muted:#9398B6; --faint:#666C8C;
  --accent:#6C7BFF; --accent-2:#43E0D8; --ink:#0A0B12;
  --pos:#3FE08A; --warn:#FFC24B; --dang:#FF6B6B;
  --border:#2A2E45; --hair:#23263A; --scrim:rgba(6,7,12,.62);
  --glow:rgba(108,123,255,.22);
  --r:16px; --safe-t:env(safe-area-inset-top,0px); --safe-b:env(safe-area-inset-bottom,0px);
}
*{box-sizing:border-box;-webkit-tap-highlight-color:transparent}
html,body{margin:0;padding:0;height:100%}
body{
  background:var(--bg); color:var(--text);
  font-family:-apple-system,BlinkMacSystemFont,"SF Pro Display","SF Pro Text","Segoe UI",Roboto,system-ui,sans-serif;
  letter-spacing:-.01em; line-height:1.4; overscroll-behavior-y:none;
  background-image:radial-gradient(120% 60% at 50% -10%, rgba(108,123,255,.10), transparent 60%);
}
.num{font-variant-numeric:tabular-nums;font-feature-settings:"tnum" 1}
.app{max-width:520px;margin:0 auto;min-height:100%;padding-top:var(--safe-t);padding-bottom:calc(86px + var(--safe-b));}
.screen{display:none;padding:14px 14px 0;animation:fade .25s ease}
.screen.active{display:block}
@keyframes fade{from{opacity:0;transform:translateY(6px)}to{opacity:1;transform:none}}
.eyebrow{font-size:10.5px;font-weight:600;letter-spacing:.06em;text-transform:uppercase;color:var(--muted);margin:0 0 8px 2px}
.card{background:var(--surface);border:1px solid var(--hair);border-radius:var(--r);padding:16px;margin-bottom:14px}
.h1{font-size:17px;font-weight:700;margin:0}
.row{display:flex;align-items:center}
.sp{justify-content:space-between}
.muted{color:var(--muted)} .faint{color:var(--faint)}
.pos{color:var(--pos)} .warn{color:var(--warn)} .dang{color:var(--dang)}

/* Header */
.hdr{display:flex;align-items:center;gap:11px;margin:2px 2px 14px}
.avatar{width:38px;height:38px;border-radius:50%;background:conic-gradient(from 0deg,var(--accent),var(--accent-2),var(--accent));animation:spin 9s linear infinite;display:flex;align-items:center;justify-content:center;font-weight:800;color:#fff;font-size:15px;flex:0 0 auto}
.avatar span{width:32px;height:32px;border-radius:50%;background:var(--bg-elev);display:flex;align-items:center;justify-content:center}
@keyframes spin{to{transform:rotate(360deg)}}
@media (prefers-reduced-motion:reduce){.avatar{animation:none}}
.hello{font-size:15px;font-weight:700}
.scrub{display:flex;align-items:center;gap:8px;margin-top:1px;font-size:12px;color:var(--muted)}
.scrub button{background:var(--surface-2);border:1px solid var(--hair);color:var(--text);width:24px;height:24px;border-radius:8px;font-size:13px;cursor:pointer}
.scrub b{min-width:96px;text-align:center;font-weight:700;color:var(--text)}

/* Donut */
.donut-wrap{display:flex;gap:14px;align-items:center}
.donut{position:relative;width:150px;height:150px;flex:0 0 auto}
.donut svg{width:150px;height:150px;display:block}
.donut-center{position:absolute;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center;pointer-events:none;text-align:center}
.donut-center .lbl{font-size:10px;font-weight:600;letter-spacing:.06em;text-transform:uppercase;color:var(--muted)}
.donut-center .big{font-size:21px;font-weight:800;margin-top:2px}
.donut-center .sub{font-size:10px;color:var(--muted);margin-top:1px}
.legend{flex:1;display:flex;flex-direction:column;gap:9px;min-width:0}
.lg{display:flex;align-items:center;gap:8px;font-size:12.5px;cursor:pointer}
.lg .sw{width:9px;height:9px;border-radius:3px;flex:0 0 auto}
.lg .nm{flex:1;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.lg .pc{font-weight:700}
.lg.dim{opacity:.4}

/* Arc gauge */
.gauge-wrap{display:flex;gap:14px;align-items:center}
.gauge{position:relative;width:128px;height:80px;flex:0 0 auto}
.gauge svg{width:128px;height:80px;display:block;overflow:visible}
.gauge .read{position:absolute;left:0;right:0;bottom:2px;text-align:center}
.gauge .read b{font-size:22px;font-weight:800}
.gauge .read i{font-size:12px;font-style:normal;color:var(--muted)}
.gmeta{flex:1;font-size:12.5px}
.gmeta .l{display:flex;justify-content:space-between;margin-bottom:4px}
.gmeta .pace{color:var(--faint);font-size:11px;margin-top:6px;line-height:1.45}
.pill{font-size:11px;font-weight:700;padding:3px 9px;border-radius:999px}

/* Insight */
.insight{background:linear-gradient(135deg,rgba(108,123,255,.16),rgba(67,224,216,.06));border:1px solid var(--border);border-radius:14px;padding:13px 14px;font-size:13px;display:flex;gap:9px;align-items:flex-start}
.insight .ic{font-size:16px}

/* Transactions */
.daygrp{margin-bottom:14px}
.dayhdr{position:sticky;top:0;display:flex;justify-content:space-between;align-items:baseline;padding:6px 4px;font-size:12.5px;color:var(--muted);background:linear-gradient(var(--bg),var(--bg) 70%,transparent);z-index:2}
.dayhdr b{font-weight:700;color:var(--text)}
.dayhdr .tot{font-weight:600}
.txcard{background:var(--surface);border:1px solid var(--hair);border-radius:14px;overflow:hidden}
.txrow-wrap{position:relative;overflow:hidden}
.txrow-wrap .del{position:absolute;top:0;right:0;bottom:0;width:64px;background:var(--dang);display:flex;align-items:center;justify-content:center;font-size:18px;color:#fff}
.txrow{position:relative;display:flex;align-items:center;gap:11px;padding:9px 12px;background:var(--surface);transition:transform .18s cubic-bezier(.22,1,.36,1);touch-action:pan-y}
.txrow + .txrow,.txrow-wrap + .txrow-wrap .txrow{border-top:1px solid var(--hair)}
.txrow-wrap:not(:first-child){border-top:1px solid var(--hair)}
.ti{width:36px;height:36px;border-radius:11px;display:flex;align-items:center;justify-content:center;font-size:18px;flex:0 0 auto}
.tx-mid{flex:1;min-width:0}
.tx-mid .t1{font-size:13.5px;font-weight:600;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.tx-mid .t2{font-size:11px;color:var(--muted);overflow:hidden;text-overflow:ellipsis;white-space:nowrap;margin-top:1px}
.tx-amt{font-size:15px;font-weight:700;flex:0 0 auto}

/* search + chips */
.search{width:100%;background:var(--surface-2);border:1px solid var(--hair);border-radius:12px;color:var(--text);padding:10px 12px;font-size:13px;margin-bottom:10px}
.search::placeholder{color:var(--faint)}
.chiprail{display:flex;gap:7px;overflow-x:auto;padding-bottom:10px;scrollbar-width:none}
.chiprail::-webkit-scrollbar{display:none}
.chip{flex:0 0 auto;padding:6px 12px;border-radius:999px;background:var(--surface-2);border:1px solid var(--hair);font-size:12.5px;font-weight:600;cursor:pointer;white-space:nowrap}
.chip.on{background:var(--accent);color:#fff;border-color:transparent}

/* analytics bars */
.bar{display:flex;align-items:center;gap:9px;margin-bottom:11px;font-size:12.5px}
.bar .nm{width:96px;display:flex;align-items:center;gap:6px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;flex:0 0 auto}
.bar .track{flex:1;height:9px;border-radius:6px;background:var(--surface-3);overflow:hidden}
.bar .fill{height:100%;border-radius:6px;transition:width .7s cubic-bezier(.22,1,.36,1)}
.bar .pc{width:38px;text-align:right;font-weight:700}
.stack{display:flex;height:11px;border-radius:6px;overflow:hidden;gap:2px;margin-bottom:16px}
.kpis{display:flex;gap:10px}
.kpi{flex:1;background:var(--surface-2);border:1px solid var(--hair);border-radius:13px;padding:11px 10px;text-align:center}
.kpi .v{font-size:15px;font-weight:800}
.kpi .k{font-size:10px;color:var(--muted);margin-top:3px}

/* profile */
.seg{display:flex;gap:8px}
.seg button{flex:1;padding:10px;border-radius:12px;background:var(--surface-2);border:1px solid var(--hair);color:var(--text);font-size:13px;font-weight:600;cursor:pointer}
.seg button.on{background:var(--accent);color:#fff;border-color:transparent}
.listbtn{width:100%;display:flex;justify-content:space-between;align-items:center;background:var(--surface);border:1px solid var(--hair);border-radius:13px;padding:14px;color:var(--text);font-size:14px;font-weight:600;cursor:pointer;margin-bottom:10px}
.listbtn.dz{color:var(--dang)}

/* tab bar */
.tabbar{position:fixed;left:0;right:0;bottom:0;z-index:30;display:flex;justify-content:center;pointer-events:none}
.tabbar .inner{pointer-events:auto;width:100%;max-width:520px;height:calc(64px + var(--safe-b));padding-bottom:var(--safe-b);background:rgba(16,18,28,.82);backdrop-filter:blur(16px);-webkit-backdrop-filter:blur(16px);border-top:1px solid var(--hair);display:flex;align-items:center;justify-content:space-around;position:relative}
.tab{flex:1;display:flex;flex-direction:column;align-items:center;gap:3px;background:none;border:none;color:var(--faint);font-size:10px;font-weight:600;cursor:pointer;padding:8px 0}
.tab .ic{font-size:19px;line-height:1}
.tab.on{color:var(--accent)}
.fab{position:absolute;left:50%;top:-18px;transform:translateX(-50%);width:56px;height:56px;border-radius:50%;background:linear-gradient(135deg,var(--accent),var(--accent-2));border:none;color:#fff;font-size:28px;font-weight:300;cursor:pointer;box-shadow:0 8px 24px var(--glow);display:flex;align-items:center;justify-content:center}
.fab:active{transform:translateX(-50%) scale(.94)}

/* add sheet */
.sheetwrap{position:fixed;inset:0;z-index:50;display:none}
.sheetwrap.open{display:block}
.sheet-scrim{position:absolute;inset:0;background:var(--scrim);backdrop-filter:blur(2px);opacity:0;transition:opacity .25s}
.sheetwrap.open .sheet-scrim{opacity:1}
.sheet{position:absolute;left:0;right:0;bottom:0;max-width:520px;margin:0 auto;background:var(--bg-elev);border-radius:24px 24px 0 0;border:1px solid var(--border);border-bottom:none;padding:8px 16px calc(20px + var(--safe-b));transform:translateY(100%);transition:transform .3s cubic-bezier(.22,1,.36,1);max-height:92vh;overflow-y:auto}
.sheetwrap.open .sheet{transform:translateY(0)}
.grab{width:40px;height:4px;border-radius:3px;background:var(--surface-3);margin:6px auto 12px}
.sheet h3{margin:0 0 14px;font-size:17px;font-weight:700;text-align:center}
.qa{display:flex;gap:8px;background:linear-gradient(135deg,rgba(108,123,255,.14),rgba(67,224,216,.05));border:1px solid var(--border);border-radius:13px;padding:6px 6px 6px 12px;align-items:center;margin-bottom:14px}
.qa input{flex:1;background:none;border:none;color:var(--text);font-size:13px;outline:none}
.qa input::placeholder{color:var(--muted)}
.qa button{background:var(--accent);border:none;color:#fff;width:34px;height:34px;border-radius:10px;font-size:16px;cursor:pointer}
.divider{text-align:center;color:var(--faint);font-size:11px;margin:6px 0 14px;position:relative}
.amount{text-align:center;margin:6px 0 16px}
.amount input{width:100%;background:none;border:none;text-align:center;color:var(--text);font-size:38px;font-weight:800;letter-spacing:-.02em;outline:none}
.amount input::placeholder{color:var(--surface-3)}
.amount .cur{font-size:13px;color:var(--muted);margin-top:-4px}
.chips{display:flex;flex-wrap:wrap;gap:8px;margin-bottom:14px}
.cchip{flex:1 1 28%;min-width:0;padding:10px 6px;border-radius:12px;background:var(--surface-2);border:1px solid var(--hair);font-size:12px;font-weight:600;cursor:pointer;text-align:center;display:flex;flex-direction:column;gap:3px;align-items:center}
.cchip .e{font-size:18px}
.cchip .nm{overflow:hidden;text-overflow:ellipsis;white-space:nowrap;max-width:100%}
.field{display:flex;gap:10px;margin-bottom:14px}
.field input{flex:1;background:var(--surface-2);border:1px solid var(--hair);border-radius:12px;color:var(--text);padding:11px 12px;font-size:13px;outline:none}
.field input::placeholder{color:var(--faint)}
.submit{width:100%;background:linear-gradient(135deg,var(--accent),var(--accent-2));border:none;color:#fff;font-size:15px;font-weight:700;padding:15px;border-radius:14px;cursor:pointer}
.submit:disabled{opacity:.45}

/* toast */
.toast{position:fixed;left:50%;bottom:calc(96px + var(--safe-b));transform:translateX(-50%) translateY(20px);background:var(--surface-3);border:1px solid var(--border);border-radius:13px;padding:11px 16px;font-size:13px;display:flex;gap:14px;align-items:center;opacity:0;transition:all .25s;z-index:60;pointer-events:none;max-width:90%}
.toast.show{opacity:1;transform:translateX(-50%) translateY(0);pointer-events:auto}
.toast button{background:none;border:none;color:var(--accent);font-weight:700;font-size:13px;cursor:pointer}

/* skeleton + empty + gate */
.sk{background:linear-gradient(90deg,var(--surface) 25%,var(--surface-2) 50%,var(--surface) 75%);background-size:200% 100%;animation:sh 1.3s infinite;border-radius:12px}
@keyframes sh{to{background-position:-200% 0}}
.empty{text-align:center;color:var(--muted);padding:40px 20px;font-size:13.5px}
.empty .e{font-size:34px;display:block;margin-bottom:10px}
.gate{position:fixed;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center;text-align:center;padding:30px;gap:8px}
.gate .e{font-size:46px}
</style>
</head>
<body>
<div class="app" id="app">
  <!-- OVERVIEW -->
  <section class="screen active" id="s-overview">
    <div class="hdr">
      <div class="avatar"><span id="ava">🙂</span></div>
      <div>
        <div class="hello" id="hello">Привет!</div>
        <div class="scrub"><button id="mPrev">‹</button><b id="mLabel">—</b><button id="mNext">›</button></div>
      </div>
    </div>
    <div id="ovBody"></div>
  </section>

  <!-- TRANSACTIONS -->
  <section class="screen" id="s-transactions">
    <div class="row sp" style="margin:2px 2px 12px"><div class="h1">Траты</div><div class="muted" id="txCount" style="font-size:12px"></div></div>
    <input class="search" id="txSearch" placeholder="🔍 Поиск по тратам…">
    <div class="chiprail" id="txChips"></div>
    <div id="txBody"></div>
  </section>

  <!-- ANALYTICS -->
  <section class="screen" id="s-analytics">
    <div class="row sp" style="margin:2px 2px 12px"><div class="h1">Аналитика</div>
      <div class="scrub"><button id="aPrev">‹</button><b id="aLabel" style="min-width:88px">—</b><button id="aNext">›</button></div>
    </div>
    <div id="anBody"></div>
  </section>

  <!-- PROFILE -->
  <section class="screen" id="s-profile">
    <div class="hdr"><div class="avatar"><span id="ava2">🙂</span></div><div class="hello" id="hello2">Профиль</div></div>
    <div id="prBody"></div>
  </section>
</div>

<!-- TAB BAR -->
<nav class="tabbar"><div class="inner">
  <button class="tab on" data-tab="overview"><span class="ic">⌂</span>Обзор</button>
  <button class="tab" data-tab="transactions"><span class="ic">≣</span>Траты</button>
  <button class="fab" id="fab">+</button>
  <button class="tab" data-tab="analytics"><span class="ic">▦</span>Аналитика</button>
  <button class="tab" data-tab="profile"><span class="ic">☻</span>Профиль</button>
</div></nav>

<!-- ADD SHEET -->
<div class="sheetwrap" id="sheet">
  <div class="sheet-scrim" id="scrim"></div>
  <div class="sheet">
    <div class="grab"></div>
    <h3 id="sheetTitle">Новая трата</h3>
    <div class="qa"><input id="qaInput" placeholder="✨ «кофе 25к в Chinar» — впишу за тебя"><button id="qaBtn">→</button></div>
    <div class="divider">— или вручную —</div>
    <div class="amount"><input id="amt" inputmode="numeric" placeholder="0"><div class="cur" id="curLbl">сум</div></div>
    <div class="chips" id="catChips"></div>
    <div class="field">
      <input id="note" placeholder="Заметка / магазин">
      <input id="pdate" type="date">
    </div>
    <button class="submit" id="submit" disabled>Записать</button>
  </div>
</div>

<div class="toast" id="toast"><span id="toastMsg"></span><button id="toastAct"></button></div>
<div class="gate" id="gate" style="display:none"><div class="e">📱</div><div style="font-weight:700">Открой приложение из Telegram</div><div class="muted" style="font-size:13px">Нажми кнопку «💼 Финансы» в боте.</div></div>

<script>
"use strict";
const TG = window.Telegram && window.Telegram.WebApp ? window.Telegram.WebApp : null;
const INIT = TG ? TG.initData : "";

const CAT_COLOR = {
  "Продукты":"#5BD6A0","Кафе и рестораны":"#FF8A5B","Транспорт":"#5BA8FF",
  "Жильё и коммуналка":"#9B8CFF","Здоровье":"#FF6FA5","Развлечения":"#C77DFF",
  "Шоппинг":"#FFC24B","Работа и бизнес":"#4FD1E0","Другое":"#8A90B0"
};
const CAT_EMOJI = {
  "Продукты":"🛒","Кафе и рестораны":"🍽️","Транспорт":"🚗","Жильё и коммуналка":"🏠",
  "Здоровье":"💊","Развлечения":"🎬","Шоппинг":"🛍️","Работа и бизнес":"💼","Другое":"📦"
};
const SRC_EMOJI={text:"⌨️",voice:"🎤",photo:"📸",audio:"🎧",app:"📱"};
const MONTHS=["январь","февраль","март","апрель","май","июнь","июль","август","сентябрь","октябрь","ноябрь","декабрь"];
const MONTHS_GEN=["января","февраля","марта","апреля","мая","июня","июля","августа","сентября","октября","ноября","декабря"];
const WD=["вс","пн","вт","ср","чт","пт","сб"];
const reduce = window.matchMedia && window.matchMedia("(prefers-reduced-motion:reduce)").matches;

let LANG="ru", CUR="сум", BUDGET=5000000, OFFSET=0, AN_OFFSET=0, OVERVIEW=null, TXS=[], TXFILTER={cat:null,q:""};

/* ── utils ── */
function money(v){v=Math.round(Number(v)||0);return v.toLocaleString("ru-RU").replace(/,/g," ")+" "+CUR;}
function moneyShort(v){v=Number(v)||0;if(v>=1e6)return (v/1e6).toFixed(2).replace(".",",")+" млн";if(v>=1e3)return Math.round(v/1e3)+" тыс";return Math.round(v).toString();}
function num(v){return (Math.round(Number(v)||0)).toLocaleString("ru-RU").replace(/,/g," ");}
function el(html){const d=document.createElement("div");d.innerHTML=html.trim();return d.firstChild;}
function haptic(type,style){try{if(!TG)return;const h=TG.HapticFeedback;if(type==="sel")h.selectionChanged();else if(type==="impact")h.impactOccurred(style||"light");else if(type==="notif")h.notificationOccurred(style||"success");}catch(e){}}
function monthKey(off){const d=new Date();d.setDate(1);d.setMonth(d.getMonth()+off);return d.getFullYear()+"-"+String(d.getMonth()+1).padStart(2,"0");}
function monthLabel(off){const d=new Date();d.setDate(1);d.setMonth(d.getMonth()+off);return MONTHS[d.getMonth()].charAt(0).toUpperCase()+MONTHS[d.getMonth()].slice(1)+" "+d.getFullYear();}
function zoneColor(p){return p<60?"var(--pos)":(p<=85?"var(--warn)":"var(--dang)");}

async function api(path,opts){
  opts=opts||{};
  const headers=Object.assign({"X-Telegram-Init-Data":INIT},opts.headers||{});
  if(opts.body){headers["Content-Type"]="application/json";opts.body=JSON.stringify(opts.body);}
  const r=await fetch(path,Object.assign({},opts,{headers}));
  if(!r.ok){let d={};try{d=await r.json()}catch(e){}throw new Error(d.detail||("HTTP "+r.status));}
  return r.json();
}

/* ── toast ── */
let toastTimer=null;
function toast(msg,actLabel,actFn,ms){
  const t=document.getElementById("toast");
  document.getElementById("toastMsg").textContent=msg;
  const b=document.getElementById("toastAct");
  if(actLabel){b.textContent=actLabel;b.style.display="";b.onclick=()=>{actFn&&actFn();hideToast();};}else{b.style.display="none";}
  t.classList.add("show");
  clearTimeout(toastTimer);toastTimer=setTimeout(hideToast,ms||3000);
}
function hideToast(){document.getElementById("toast").classList.remove("show");}

/* ── SVG charts ── */
function donutSVG(cats,total){
  const C=2*Math.PI*40, GAP=2;
  let off=0, segs="";
  cats.forEach((c,i)=>{
    if(c.total<=0)return;
    const len=Math.max(0,(c.share/100)*C-GAP);
    const color=CAT_COLOR[c.category]||"#8A90B0";
    const dash=reduce?`${len} ${C-len}`:`0 ${C}`;
    segs+=`<circle class="seg" data-i="${i}" cx="50" cy="50" r="40" fill="none" stroke="${color}" stroke-width="13" stroke-linecap="round" stroke-dasharray="${dash}" stroke-dashoffset="${-off}" data-len="${len}"/>`;
    off+=(c.share/100)*C;
  });
  return `<svg viewBox="0 0 100 100"><g transform="rotate(-90 50 50)"><circle cx="50" cy="50" r="40" fill="none" stroke="#1E2133" stroke-width="13"/>${segs}</g></svg>`;
}
function animateDonut(box){
  if(reduce)return;
  const segs=box.querySelectorAll(".seg"),C=2*Math.PI*40;
  segs.forEach((s,i)=>{const len=parseFloat(s.dataset.len);setTimeout(()=>{s.style.transition="stroke-dasharray .7s cubic-bezier(.22,1,.36,1)";s.setAttribute("stroke-dasharray",`${len} ${C-len}`);},60+i*40);});
}
function gaugeSVG(pct){
  const L=157, p=Math.min(100,Math.max(0,pct)), col=zoneColor(pct);
  const dashoff=reduce?L*(1-p/100):L;
  return `<svg viewBox="0 0 120 74"><path d="M10 64 A50 50 0 0 1 110 64" fill="none" stroke="#1E2133" stroke-width="11" stroke-linecap="round"/>`+
    `<path class="gfill" d="M10 64 A50 50 0 0 1 110 64" fill="none" stroke="${col}" stroke-width="11" stroke-linecap="round" stroke-dasharray="${L}" stroke-dashoffset="${dashoff}" data-target="${L*(1-p/100)}"/></svg>`;
}
function animateGauge(box){if(reduce)return;const f=box.querySelector(".gfill");if(!f)return;setTimeout(()=>{f.style.transition="stroke-dashoffset .7s cubic-bezier(.22,1,.36,1)";f.setAttribute("stroke-dashoffset",f.dataset.target);},80);}
function trendSVG(data){
  if(!data||!data.length)data=[0];
  const W=300,H=80,mx=Math.max(...data,1),n=data.length;
  const pts=data.map((v,i)=>[ (n===1?W/2:i/(n-1)*W), H-6-(v/mx)*(H-14) ]);
  const line=pts.map(p=>p[0].toFixed(1)+","+p[1].toFixed(1)).join(" ");
  const area=`0,${H} `+line+` ${W},${H}`;
  const last=pts[pts.length-1];
  return `<svg viewBox="0 0 ${W} ${H}" preserveAspectRatio="none" style="width:100%;height:80px">
    <defs><linearGradient id="ag" x1="0" y1="0" x2="0" y2="1"><stop offset="0" stop-color="#6C7BFF" stop-opacity=".35"/><stop offset="1" stop-color="#6C7BFF" stop-opacity="0"/></linearGradient></defs>
    <line x1="0" y1="${H/2}" x2="${W}" y2="${H/2}" stroke="#23263A" stroke-width="1"/>
    <polygon points="${area}" fill="url(#ag)"/>
    <polyline points="${line}" fill="none" stroke="#6C7BFF" stroke-width="2.2" stroke-linejoin="round" stroke-linecap="round"/>
    <circle cx="${last[0].toFixed(1)}" cy="${last[1].toFixed(1)}" r="3.5" fill="#43E0D8"/></svg>`;
}

function renderTxList(){
  const body=document.getElementById("txBody");
  let list=TXS.slice();
  if(TXFILTER.cat)list=list.filter(t=>t.category===TXFILTER.cat);
  if(TXFILTER.q){const q=TXFILTER.q.toLowerCase();list=list.filter(t=>((t.merchant||"")+" "+(t.description||"")+" "+t.category).toLowerCase().includes(q));}
  document.getElementById("txCount").textContent=TXS.length?TXS.length+" операций":"";

  // group by date
  const groups={};list.forEach(t=>{(groups[t.purchase_date]=groups[t.purchase_date]||[]).push(t);});

function dateLabel(dt){
  const d=new Date(dt+"T00:00:00"), today=new Date();today.setHours(0,0,0,0);
  const diff=Math.round((today-d)/86400000);
  if(diff===0)return "Сегодня";if(diff===1)return "Вчера";
  if(diff>1&&diff<7)return WD[d.getDay()]+", "+d.getDate()+" "+MONTHS_GEN[d.getMonth()];
  return d.getDate()+" "+MONTHS_GEN[d.getMonth()];
}
function txRow(t){
  const col=CAT_COLOR[t.category]||"#8A90B0";

  const src=SRC_EMOJI[t.input_type]||"";

function esc(s){return (s||"").replace(/[<>&]/g,c=>({"<":"&lt;",">":"&gt;","&":"&amp;"}[c]));}
function bindSwipe(){
  document.querySelectorAll(".txrow-wrap").forEach(w=>{
    const row=w.querySelector(".txrow");let sx=0,dx=0,drag=false;
    row.addEventListener("touchstart",e=>{sx=e.touches[0].clientX;drag=true;row.style.transition="none";},{passive:true});
    row.addEventListener("touchmove",e=>{if(!drag)return;dx=Math.min(0,Math.max(-72,e.touches[0].clientX-sx));row.style.transform=`translateX(${dx}px)`;},{passive:true});
    row.addEventListener("touchend",()=>{drag=false;row.style.transition="";if(dx<-50){row.style.transform="translateX(-64px)";}else{row.style.transform="";}dx=0;});
    w.querySelector(".del").onclick=()=>deleteTx(w.dataset.id);
  });
}
async function deleteTx(id){

  if(!INIT){showGate();return;}
  // user
  try{const u=TG&&TG.initDataUnsafe&&TG.initDataUnsafe.user;if(u){const nm=u.first_name||"друг";document.getElementById("hello").textContent="Привет, "+nm;document.getElementById("hello2").textContent=nm;const ini=(u.first_name||"🙂").charAt(0).toUpperCase();document.getElementById("ava").textContent=ini;document.getElementById("ava2").textContent=ini;}}catch(e){}
  // tabs
  document.querySelectorAll(".tab").forEach(t=>t.onclick=()=>switchTab(t.dataset.tab));
  document.getElementById("fab").onclick=openSheet;
  document.getElementById("scrim").onclick=closeSheet;
  document.getElementById("submit").onclick=submitTx;
  document.getElementById("qaBtn").onclick=quickAdd;
  document.getElementById("amt").addEventListener("input",e=>{const v=e.target.value.replace(/\D/g,"");e.target.value=v?(+v).toLocaleString("ru-RU").replace(/,/g," "):"";updateSubmit();});
  document.getElementById("txSearch").addEventListener("input",e=>{TXFILTER.q=e.target.value;renderTxList();});
  document.getElementById("mPrev").onclick=()=>{OFFSET--;loadOverview();loadTx();};
  document.getElementById("mNext").onclick=()=>{if(OFFSET<0){OFFSET++;loadOverview();loadTx();}};
  document.getElementById("aPrev").onclick=()=>{AN_OFFSET--;loadAnalytics();};
  document.getElementById("aNext").onclick=()=>{if(AN_OFFSET<0){AN_OFFSET++;loadAnalytics();}};
  if(TG&&TG.MainButton)TG.MainButton.onClick(submitTx);
  renderCatChips();
  loadOverview();loadTx();
}
init();
</script>
</body>
