<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no, viewport-fit=cover">
<title>Финансы</title>
<script src="https://telegram.org/js/telegram-web-app.js"></script>
<style>
:root{
  --bg:#0A0B0E; --bg-2:#101216; --surface:#16181D; --surface-2:#1E2128; --surface-3:#2A2E37;
  --text:#FFFFFF; --muted:#8C92A2; --faint:#5A6072;
  --accent:#2BD96B; --accent-press:#22b757; --accent-soft:rgba(43,217,107,.14); --on-accent:#04130A;
  --pos:#2BD96B; --dang:#FF5B5B; --warn:#FFB23E; --info:#4AA8FF;
  --border:#262A33; --hair:#20242C; --scrim:rgba(4,5,9,.64); --nav-bg:rgba(20,22,27,.94);
  --r:18px; --r-sm:13px;
  --safe-t:env(safe-area-inset-top,0px); --safe-b:env(safe-area-inset-bottom,0px);
}
body.light{
  --bg:#EDF0F4; --bg-2:#FFFFFF; --surface:#FFFFFF; --surface-2:#F2F5F8; --surface-3:#E6EAF1;
  --text:#10141B; --muted:#697086; --faint:#9298A8;
  --border:#E2E6EE; --hair:#EBEEF3; --scrim:rgba(16,20,27,.4);
  --pos:#12A150; --dang:#E5484D; --warn:#E08200; --nav-bg:rgba(255,255,255,.95);
}
.hello{font-size:22px;font-weight:800;letter-spacing:-.02em;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;min-width:0}
*{box-sizing:border-box;-webkit-tap-highlight-color:transparent}
html,body{margin:0;padding:0;height:100%}
body{
  background:var(--bg); color:var(--text);
  font-family:-apple-system,BlinkMacSystemFont,"SF Pro Display","SF Pro Text","Segoe UI",Roboto,system-ui,sans-serif;
  letter-spacing:-.01em; line-height:1.4; overscroll-behavior-y:none;
}
.num{font-variant-numeric:tabular-nums;font-feature-settings:"tnum" 1}
.app{max-width:500px;margin:0 auto;min-height:100%;padding:var(--safe-t) 14px calc(96px + var(--safe-b))}
.screen{display:none;animation:fade .24s ease}
.screen.active{display:block}
@keyframes fade{from{opacity:0;transform:translateY(6px)}to{opacity:1;transform:none}}
.pos{color:var(--pos)} .dang{color:var(--dang)} .warn{color:var(--warn)} .muted{color:var(--muted)} .faint{color:var(--faint)}

/* header */
.phead{display:flex;align-items:center;justify-content:space-between;margin:12px 2px 16px;gap:10px}
.phead h1{font-size:29px;font-weight:800;letter-spacing:-.025em;margin:0}
.brand{font-size:27px;font-weight:800;letter-spacing:-.01em}
.brand .on{color:var(--accent)}
.hbtns{display:flex;gap:9px;align-items:center;flex:0 0 auto}
.chip{display:inline-flex;align-items:center;gap:5px;background:var(--surface-2);border:1px solid var(--border);border-radius:13px;padding:0 13px;height:44px;font-size:13.5px;font-weight:700}
.iconbtn{width:44px;height:44px;border-radius:13px;background:var(--surface-2);border:1px solid var(--border);color:var(--text);display:flex;align-items:center;justify-content:center;cursor:pointer}
.iconbtn svg{width:20px;height:20px}
.addbtn{width:48px;height:48px;border-radius:14px;background:var(--accent);border:none;color:var(--on-accent);font-size:30px;font-weight:300;line-height:1;display:flex;align-items:center;justify-content:center;cursor:pointer;box-shadow:0 8px 18px -6px var(--accent)}
.addbtn:active{transform:scale(.94)}

/* balance card */
.balance{position:relative;border-radius:20px;padding:20px 20px 18px;background:linear-gradient(120deg,#22C55E 0%,#10B59C 38%,#3B82F6 74%,#7C5CFF 100%);overflow:hidden;margin-bottom:14px;box-shadow:0 16px 34px -14px rgba(34,197,94,.5)}
.balance::after{content:"";position:absolute;right:-40px;top:-40px;width:160px;height:160px;border-radius:50%;background:rgba(255,255,255,.10)}
.balance .lbl{font-size:13.5px;font-weight:600;color:rgba(255,255,255,.9)}
.balance .big{font-size:39px;font-weight:800;letter-spacing:-.03em;line-height:1.05;margin-top:8px;color:#fff;position:relative}
.balance .cur{font-size:13.5px;color:rgba(255,255,255,.85);margin-top:3px;font-weight:600}
.balance .acts{position:absolute;top:18px;right:18px;display:flex;gap:8px}
.balance .acts button{width:36px;height:36px;border-radius:11px;background:rgba(255,255,255,.2);border:none;color:#fff;display:flex;align-items:center;justify-content:center;cursor:pointer}
.balance .acts button svg{width:18px;height:18px}

/* stat strip / 3-col cards */
.stats{display:flex;background:var(--surface);border:1px solid var(--hair);border-radius:16px;padding:15px 2px;margin-bottom:16px}
.stats .st{flex:1;text-align:center;padding:0 8px;position:relative;min-width:0}
.stats .st + .st::before{content:"";position:absolute;left:0;top:2px;bottom:2px;width:1px;background:var(--hair)}
.stats .st .k{font-size:10px;font-weight:600;letter-spacing:.04em;text-transform:uppercase;color:var(--muted);white-space:nowrap}
.stats .st .v{font-size:16px;font-weight:800;margin-top:7px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}

/* sections */
.sechd{display:flex;justify-content:space-between;align-items:center;margin:18px 2px 10px}
.sechd:first-child{margin-top:0}
.sechd .t{font-size:11px;font-weight:700;letter-spacing:.07em;text-transform:uppercase;color:var(--muted)}
.sechd .more{font-size:13.5px;font-weight:600;color:var(--accent);cursor:pointer;display:flex;align-items:center;gap:2px}

/* list rows */
.list{background:var(--surface);border:1px solid var(--hair);border-radius:16px;overflow:hidden;margin-bottom:16px}
.lrow{display:flex;align-items:center;gap:12px;padding:13px 14px;cursor:pointer}
.lrow + .lrow{border-top:1px solid var(--hair)}
.lic{width:42px;height:42px;border-radius:12px;display:flex;align-items:center;justify-content:center;font-size:19px;flex:0 0 auto}
.lmid{flex:1;min-width:0}
.lmid .t1{font-size:15px;font-weight:700;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.lmid .t2{font-size:12.5px;color:var(--muted);margin-top:3px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;display:flex;gap:6px;align-items:center;flex-wrap:wrap}
.lamt{font-size:15.5px;font-weight:800;flex:0 0 auto;text-align:right;white-space:nowrap}
.lamt .s{display:block;font-size:10px;font-weight:800;margin-top:4px;letter-spacing:.03em}
.minitag{background:var(--surface-3);color:var(--muted);border-radius:6px;padding:1px 7px;font-size:10.5px;font-weight:600}

/* info banner */
.banner{display:flex;gap:11px;align-items:flex-start;background:var(--accent-soft);border:1px solid var(--accent);border-radius:14px;padding:13px 14px;margin-bottom:14px}
.banner .bic{flex:0 0 auto;width:22px;height:22px;border-radius:50%;background:var(--accent);color:var(--on-accent);display:flex;align-items:center;justify-content:center;font-size:13px;font-weight:800}
.banner .btx{flex:1;font-size:12.5px;color:var(--muted);line-height:1.45}
.banner .bx{flex:0 0 auto;color:var(--muted);cursor:pointer;font-size:17px;line-height:1;padding:0 2px}

/* segmented tabs */
.segs{display:flex;gap:8px;overflow-x:auto;padding-bottom:4px;margin-bottom:14px;scrollbar-width:none}
.segs::-webkit-scrollbar{display:none}
.segc{flex:0 0 auto;padding:10px 17px;border-radius:12px;background:var(--surface-2);border:1px solid var(--border);color:var(--muted);font-size:13.5px;font-weight:600;cursor:pointer;white-space:nowrap;display:flex;align-items:center;gap:7px}
.segc.on{background:var(--accent-soft);border-color:transparent;color:var(--accent)}
.segc .cnt{font-size:11px;opacity:.7}
.segc .pd{width:8px;height:8px;border-radius:50%}

/* empty / skeleton */
.empty{text-align:center;color:var(--muted);padding:34px 18px;font-size:13.5px;line-height:1.5}
.empty .e{font-size:34px;display:block;margin-bottom:10px}
.empty .cta{display:inline-flex;align-items:center;gap:8px;margin-top:14px;background:var(--accent);color:var(--on-accent);border:none;border-radius:13px;padding:13px 20px;font-size:14.5px;font-weight:700;cursor:pointer}
.emptycard{background:var(--surface);border:1px solid var(--hair);border-radius:16px;padding:6px 14px;margin-bottom:16px}
.sk{background:linear-gradient(90deg,var(--surface) 25%,var(--surface-2) 50%,var(--surface) 75%);background-size:200% 100%;animation:sh 1.3s infinite;border-radius:14px;margin-bottom:12px}
@keyframes sh{to{background-position:-200% 0}}
.note{text-align:center;color:var(--faint);font-size:12px;line-height:1.5;margin:6px 12px 8px}

/* calendar */
.cal{background:var(--surface);border:1px solid var(--hair);border-radius:18px;padding:14px;margin-bottom:16px}
.calhd{display:flex;align-items:center;justify-content:space-between;margin-bottom:12px}
.calhd b{font-size:15.5px;font-weight:700;text-transform:capitalize}
.calnav{width:36px;height:36px;border-radius:11px;background:var(--surface-2);border:1px solid var(--border);color:var(--text);cursor:pointer;font-size:16px}
.calgrid{display:grid;grid-template-columns:repeat(7,1fr);gap:3px}
.calwd{text-align:center;font-size:11px;color:var(--muted);font-weight:600;padding:3px 0 6px}
.calday{aspect-ratio:1;display:flex;align-items:center;justify-content:center;border-radius:12px;font-size:14px;font-weight:600;cursor:pointer;position:relative;color:var(--text)}
.calday.blank{cursor:default}
.calday.today{background:var(--accent);color:var(--on-accent);font-weight:800}
.calday.sel:not(.today){box-shadow:inset 0 0 0 2px var(--accent)}
.calday .dot{position:absolute;bottom:5px;width:5px;height:5px;border-radius:50%;background:var(--accent)}
.calday.today .dot{background:var(--on-accent)}
.dayhd{font-size:11px;font-weight:700;letter-spacing:.06em;text-transform:uppercase;color:var(--muted);margin:0 2px 10px}

/* payments / status */
.badge{font-size:10px;font-weight:800;letter-spacing:.03em;margin-top:4px;display:block;text-align:right}

/* tasks */
.tk{display:flex;align-items:flex-start;gap:12px;padding:14px;background:var(--surface);border:1px solid var(--hair);border-radius:16px;margin-bottom:10px}
.tkbox{width:24px;height:24px;border-radius:50%;border:2px solid var(--faint);flex:0 0 auto;margin-top:1px;cursor:pointer;display:flex;align-items:center;justify-content:center;color:transparent}
.tkbox.crit{border-color:var(--dang)}
.tkbox.done{background:var(--accent);border-color:var(--accent);color:var(--on-accent)}
.tkbody{flex:1;min-width:0;cursor:pointer}
.tkbody .tt{font-size:15px;font-weight:700;overflow:hidden;text-overflow:ellipsis}
.tkbody .tt.done{text-decoration:line-through;color:var(--muted)}
.tksub{display:flex;flex-wrap:wrap;gap:6px;align-items:center;margin-top:7px;font-size:12px;color:var(--muted)}
.tag{background:var(--accent-soft);color:var(--accent);border-radius:7px;padding:2px 8px;font-size:11px;font-weight:600}
.pdot{width:11px;height:11px;border-radius:50%;flex:0 0 auto;margin-top:6px}

/* tab bar */
.tabbar{position:fixed;left:0;right:0;bottom:0;z-index:40;display:flex;justify-content:center;padding:0 10px calc(8px + var(--safe-b));pointer-events:none}
.tabbar .inner{pointer-events:auto;width:100%;max-width:480px;background:var(--nav-bg);backdrop-filter:blur(18px);-webkit-backdrop-filter:blur(18px);border:1px solid var(--border);border-radius:22px;display:flex;align-items:center;justify-content:space-between;padding:7px;gap:2px;box-shadow:0 12px 32px -8px rgba(0,0,0,.7)}
.tab{flex:1;display:flex;flex-direction:column;align-items:center;gap:4px;background:none;border:none;color:var(--faint);font-size:10px;font-weight:600;cursor:pointer;padding:8px 1px;border-radius:15px;transition:background .2s,color .2s}
.tab .ic{height:22px;display:flex;align-items:center}
.tab .ic svg{width:22px;height:22px;display:block;stroke:currentColor;fill:none;stroke-width:1.9;stroke-linecap:round;stroke-linejoin:round}
.tab.on{background:var(--accent);color:var(--on-accent)}

/* sheets */
.sheetwrap{position:fixed;inset:0;z-index:50;display:none}
.sheetwrap.open{display:block}
.sheet-scrim{position:absolute;inset:0;background:var(--scrim);opacity:0;transition:opacity .25s}
.sheetwrap.open .sheet-scrim{opacity:1}
.sheet{position:absolute;left:0;right:0;bottom:0;max-width:500px;margin:0 auto;background:var(--bg-2);border-radius:24px 24px 0 0;border:1px solid var(--border);border-bottom:none;padding:8px 16px calc(22px + var(--safe-b));transform:translateY(100%);transition:transform .3s cubic-bezier(.22,1,.36,1);max-height:94vh;overflow-y:auto}
.sheetwrap.open .sheet{transform:translateY(0)}
.grab{width:40px;height:4px;border-radius:3px;background:var(--surface-3);margin:6px auto 14px}
.sheet h3{margin:0 0 16px;font-size:18px;font-weight:800;text-align:center}
.seg2{display:flex;gap:8px;margin-bottom:16px}
.seg2 button{flex:1;padding:12px;border-radius:13px;background:var(--surface-2);border:1px solid var(--border);color:var(--text);font-size:14px;font-weight:700;cursor:pointer}
.seg2 button.on{background:var(--accent);color:var(--on-accent);border-color:transparent}
.seg2 button.on.exp{background:var(--dang);color:#fff}
.qa{display:flex;gap:8px;background:var(--accent-soft);border:1px solid var(--accent);border-radius:13px;padding:6px 6px 6px 12px;align-items:center;margin-bottom:14px}
.qa input{flex:1;background:none;border:none;color:var(--text);font-size:13px;outline:none}
.qa input::placeholder{color:var(--muted)}
.qa button{background:var(--accent);border:none;color:var(--on-accent);width:34px;height:34px;border-radius:10px;font-size:16px;cursor:pointer}
.divider{text-align:center;color:var(--faint);font-size:11px;margin:4px 0 14px}
.amount{text-align:center;margin:6px 0 16px}
.amount input{width:100%;background:none;border:none;text-align:center;color:var(--text);font-size:40px;font-weight:800;letter-spacing:-.02em;outline:none}
.amount input::placeholder{color:var(--surface-3)}
.amount .cur{font-size:13px;color:var(--muted);margin-top:-2px}
.chips{display:flex;flex-wrap:wrap;gap:8px;margin-bottom:14px}
.cchip{flex:1 1 28%;min-width:0;padding:11px 6px;border-radius:12px;background:var(--surface-2);border:1px solid var(--border);font-size:12px;font-weight:600;cursor:pointer;text-align:center;display:flex;flex-direction:column;gap:4px;align-items:center}
.cchip .e{font-size:18px}
.cchip .nm{overflow:hidden;text-overflow:ellipsis;white-space:nowrap;max-width:100%}
.flbl{font-size:12px;font-weight:600;color:var(--muted);margin:0 4px 7px}
.field{margin-bottom:14px}
.field input,.field textarea,.field select{width:100%;background:var(--surface-2);border:1px solid var(--border);border-radius:12px;color:var(--text);padding:13px 13px;font-size:14px;outline:none;font-family:inherit}
.field input::placeholder,.field textarea::placeholder{color:var(--faint)}
.field.row2{display:flex;gap:10px}
.field.row2 > *{flex:1}
.prio-chips{display:flex;flex-wrap:wrap;gap:8px;margin-bottom:14px}
.pchip{flex:0 0 auto;padding:9px 13px;border-radius:11px;background:var(--surface-2);border:1px solid var(--border);font-size:13px;font-weight:600;cursor:pointer;display:flex;align-items:center;gap:7px}
.pchip.on{border-color:transparent;color:#fff}
.submit{width:100%;background:var(--accent);border:none;color:var(--on-accent);font-size:15.5px;font-weight:800;padding:16px;border-radius:14px;cursor:pointer;margin-top:2px}
.submit:disabled{opacity:.45}
.submit.exp{background:var(--dang);color:#fff}
.shbtns{display:flex;gap:10px;margin-top:12px}
.shbtns button{flex:1;padding:13px;border-radius:13px;background:var(--surface-2);border:1px solid var(--border);color:var(--text);font-size:13.5px;font-weight:700;cursor:pointer}
.shbtns button.dz{color:var(--dang)}
.shbtns button.pri{background:var(--accent);color:var(--on-accent);border-color:transparent}

/* settings */
.setgrp{margin-bottom:18px}
.setgrp .gh{font-size:11px;font-weight:700;letter-spacing:.07em;text-transform:uppercase;color:var(--muted);margin:0 4px 10px}
.setrow{display:flex;align-items:center;justify-content:space-between;background:var(--surface);border:1px solid var(--hair);border-radius:14px;padding:15px 16px;margin-bottom:10px;cursor:pointer}
.setrow .l{font-size:15px;font-weight:600}
.setrow .r{display:flex;align-items:center;gap:9px;color:var(--muted);font-size:14px}
.setrow .r .sw{width:22px;height:22px;border-radius:7px}
.setrow.dz .l{color:var(--dang)}
.setrow.dz.outline{border-color:rgba(255,91,91,.5);background:rgba(255,91,91,.05)}
.privtext{font-size:12.5px;color:var(--muted);line-height:1.5;margin:2px 4px 12px}
.swatches{display:flex;gap:10px;flex-wrap:wrap;margin-bottom:8px}
.swatch{width:38px;height:38px;border-radius:11px;cursor:pointer;border:2px solid transparent}
.swatch.on{border-color:var(--text)}
.tg{display:flex;justify-content:space-between;align-items:center;padding:13px 4px;border-bottom:1px solid var(--hair)}
.tg:last-child{border-bottom:none}
.tg .lbl{font-size:13.5px;font-weight:600}
.tg .lbl .d{font-size:11px;color:var(--muted);font-weight:400;margin-top:1px}
.sw2{width:46px;height:27px;border-radius:999px;background:var(--surface-3);position:relative;transition:background .2s;flex:0 0 auto;cursor:pointer}
.sw2.on{background:var(--accent)}
.sw2::after{content:"";position:absolute;top:3px;left:3px;width:21px;height:21px;border-radius:50%;background:#fff;transition:transform .2s}
.sw2.on::after{transform:translateX(19px)}
.curgrid{display:flex;flex-wrap:wrap;gap:8px}
.curchip{flex:1 1 28%;min-width:0;padding:11px 6px;border-radius:12px;background:var(--surface-2);border:1px solid var(--border);font-size:13px;font-weight:600;cursor:pointer;text-align:center;display:flex;flex-direction:column;gap:3px;align-items:center}
.curchip .fl{font-size:18px}
.curchip.on{background:var(--accent);color:var(--on-accent);border-color:transparent}

/* toast + gate */
.toast{position:fixed;left:50%;bottom:calc(108px + var(--safe-b));transform:translateX(-50%) translateY(20px);background:var(--surface-3);border:1px solid var(--border);border-radius:13px;padding:11px 16px;font-size:13px;display:flex;gap:14px;align-items:center;opacity:0;transition:all .25s;z-index:60;pointer-events:none;max-width:90%}
.toast.show{opacity:1;transform:translateX(-50%) translateY(0);pointer-events:auto}
.toast button{background:none;border:none;color:var(--accent);font-weight:700;font-size:13px;cursor:pointer}
.gate{position:fixed;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center;text-align:center;padding:30px;gap:8px}
.gate .e{font-size:46px}
</style>
</head>
<body>
<div class="app" id="app">

  <!-- ░░ OVERVIEW ░░ -->
  <section class="screen active" id="s-overview">
    <div class="phead">
      <div class="hello" id="ovHello">Привет 👋</div>
      <div class="hbtns">
        <span class="chip" id="opsChip">📊 0</span>
        <button class="iconbtn" id="openSettings" aria-label="Настройки"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="3"/><path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 1 1-2.83 2.83l-.06-.06a1.65 1.65 0 0 0-2.82 1.17V21a2 2 0 0 1-4 0v-.09A1.65 1.65 0 0 0 8 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 1 1-2.83-2.83l.06-.06A1.65 1.65 0 0 0 4.6 15H4.5a2 2 0 0 1 0-4h.09A1.65 1.65 0 0 0 6 9.4l-.06-.06a2 2 0 1 1 2.83-2.83l.06.06A1.65 1.65 0 0 0 11 6.6V4.5a2 2 0 0 1 4 0v.09A1.65 1.65 0 0 0 18 6.6l.06-.06a2 2 0 1 1 2.83 2.83l-.06.06A1.65 1.65 0 0 0 19.4 11h.1a2 2 0 0 1 0 4z"/></svg></button>
        <button class="addbtn" data-add="tx" aria-label="Добавить">+</button>
      </div>
    </div>
    <div id="ovBody"></div>
  </section>

  <!-- ░░ REPORTS ░░ -->
  <section class="screen" id="s-reports">
    <div class="phead"><h1>Отчёты</h1><button class="addbtn" data-add="tx">+</button></div>
    <div id="repBanner"></div>
    <div class="segs" id="repSegs"></div>
    <div id="repCustom"></div>
    <div id="repBody"></div>
  </section>

  <!-- ░░ EVENTS ░░ -->
  <section class="screen" id="s-events">
    <div class="phead"><h1>События</h1><button class="addbtn" data-add="event">+</button></div>
    <div id="evBanner"></div>
    <div id="calBox"></div>
    <div id="evDay"></div>
  </section>

  <!-- ░░ PAYMENTS ░░ -->
  <section class="screen" id="s-payments">
    <div class="phead"><h1>Оплата</h1><button class="addbtn" data-add="payment">+</button></div>
    <div id="payBanner"></div>
    <div id="paySummary"></div>

<div class="gate" id="gate" style="display:none"><div class="e">📱</div><div style="font-weight:700">Откройте приложение из Telegram</div><div class="muted" style="font-size:13px">Нажмите кнопку приложения в боте.</div></div>

<script>
"use strict";
const TG = window.Telegram && window.Telegram.WebApp ? window.Telegram.WebApp : null;
const INIT = TG ? TG.initData : "";
const reduce = window.matchMedia && window.matchMedia("(prefers-reduced-motion:reduce)").matches;

/* ── reference data ── */
const EXP_COLOR={"Продукты":"#5BD6A0","Кафе и рестораны":"#FF8A5B","Транспорт":"#5BA8FF","Жильё и коммуналка":"#9B8CFF","Здоровье":"#FF6FA5","Развлечения":"#C77DFF","Шоппинг":"#FFC24B","Работа и бизнес":"#4FD1E0","Другое":"#8A90B0"};
const PRIO={critical:{c:"#FF4D4D",t:"Критично"},high:{c:"#FF7A45",t:"Высокий"},medium:{c:"#FFB23E",t:"Средний"},low:{c:"#4AA8FF",t:"Низкий"}};
const MONTHS=["январь","февраль","март","апрель","май","июнь","июль","август","сентябрь","октябрь","ноябрь","декабрь"];
const MONTHS_GEN=["января","февраля","марта","апреля","мая","июня","июля","августа","сентября","октября","ноября","декабря"];
const MONTHS_S=["янв","фев","мар","апр","май","июн","июл","авг","сен","окт","ноя","дек"];
const WD=["Пн","Вт","Ср","Чт","Пт","Сб","Вс"];
const WD_FULL=["воскресенье","понедельник","вторник","среда","четверг","пятница","суббота"];
const PERIODS={monthly:"мес.",weekly:"нед.",yearly:"год"};
const ACCENTS={green:{a:"#2BD96B",s:"rgba(43,217,107,.14)",p:"#22b757",o:"#04130A"},blue:{a:"#3B82F6",s:"rgba(59,130,246,.16)",p:"#2f6fe0",o:"#fff"},purple:{a:"#8B5CF6",s:"rgba(139,92,246,.16)",p:"#7a4fe0",o:"#fff"},orange:{a:"#FF8A3D",s:"rgba(255,138,61,.16)",p:"#f07a2c",o:"#1a0d02"},pink:{a:"#FF5CA8",s:"rgba(255,92,168,.16)",p:"#f04f98",o:"#1a0210"}};
const CURRENCIES={UZS:{symbol:"сум",pos:"suffix",dec:0,grp:" ",flag:"🇺🇿"},USD:{symbol:"$",pos:"prefix",dec:2,grp:",",flag:"🇺🇸"},EUR:{symbol:"€",pos:"prefix",dec:2,grp:",",flag:"🇪🇺"},RUB:{symbol:"₽",pos:"suffix",dec:0,grp:" ",flag:"🇷🇺"},KZT:{symbol:"₸",pos:"suffix",dec:0,grp:" ",flag:"🇰🇿"},TRY:{symbol:"₺",pos:"prefix",dec:0,grp:" ",flag:"🇹🇷"},GBP:{symbol:"£",pos:"prefix",dec:2,grp:",",flag:"🇬🇧"},AED:{symbol:"AED",pos:"suffix",dec:2,grp:",",flag:"🇦🇪"}};
function curMeta(c){return CURRENCIES[c]||CURRENCIES.UZS;}

/* ── state ── */
let ME=null, LANG="ru", CURCODE="UZS", OVERVIEW=null, BAL_HIDDEN=false;
let CATS={categories:[],income:[],payment:[]};
let RTAB="month", RFROM=null, RTO=null;
let EVENTS=[], CAL_OFFSET=0, SEL_DATE=null, EV_LOADED=false;
let PAYMENTS=[], PAY_SUMMARY=null, PAY_FILTER="all", EDIT_PAY=null, PAY_LOADED=false;
let TASKS=[], FOLDERS=[], TCOUNTS={active:0,done:0,cancelled:0}, TSTATUS="all", TPRIO="all", EDIT_TASK=null, TK_LOADED=false;
let TX_TYPE="expense", SEL_TXCAT=null, SEL_PAYCAT=null, SEL_PRIO=null;
let EDIT_EVENT=null;

/* ── utils ── */
function fmtNum(v,dec,grp){v=Number(v)||0;const neg=v<0;v=Math.abs(v);const s=v.toLocaleString("en-US",{minimumFractionDigits:dec,maximumFractionDigits:dec});const p=s.split(".");p[0]=p[0].replace(/,/g,grp);return (neg?"−":"")+p.join(".");}
function money(v,code){const m=curMeta(code||CURCODE);const b=fmtNum(v,m.dec,m.grp);return m.pos==="prefix"?m.symbol+b:b+" "+m.symbol;}
function num(v,code){const m=curMeta(code||CURCODE);return fmtNum(v,m.dec,m.grp);}
function short(v,code){const m=curMeta(code||CURCODE);v=Number(v)||0;const neg=v<0,a=Math.abs(v);
  if(a<1e5)return fmtNum(v,m.dec,m.grp);
  let b=a>=1e6?(Math.floor(a/1e4)/100+"").replace(".",",")+"M":Math.floor(a/1e3)+"K";return (neg?"−":"")+b;}
function amt(v,code){code=code||CURCODE;return short(v,code)+" "+code;}
function money2(v,code){code=code||CURCODE;return fmtNum(v,2,curMeta(code).grp).replace(/([.,]\d*?)0+$/,"$1").replace(/[.,]$/,"")+" "+code;}
function esc(s){return (s==null?"":String(s)).replace(/[<>&]/g,c=>({"<":"&lt;",">":"&gt;","&":"&amp;"}[c]));}
function dotDate(iso){if(!iso)return "";const d=new Date(iso+"T00:00:00");if(isNaN(d))return "";return d.getDate()+" "+MONTHS_S[d.getMonth()]+".";}
function haptic(type,style){try{if(!TG)return;const h=TG.HapticFeedback;if(type==="sel")h.selectionChanged();else if(type==="impact")h.impactOccurred(style||"light");else if(type==="notif")h.notificationOccurred(style||"success");}catch(e){}}
function monthKey(off){const d=new Date();d.setDate(1);d.setMonth(d.getMonth()+off);return d.getFullYear()+"-"+String(d.getMonth()+1).padStart(2,"0");}
function todayISO(){const d=new Date();return d.getFullYear()+"-"+String(d.getMonth()+1).padStart(2,"0")+"-"+String(d.getDate()).padStart(2,"0");}
function plural(n,f){n=Math.abs(n)%100;const n1=n%10;if(n>10&&n<20)return f[2];if(n1>1&&n1<5)return f[1];if(n1===1)return f[0];return f[2];}

async function api(path,opts){
  opts=opts||{};
  const headers=Object.assign({"X-Telegram-Init-Data":INIT},opts.headers||{});
  if(opts.body){headers["Content-Type"]="application/json";opts.body=JSON.stringify(opts.body);}
  const r=await fetch(path,Object.assign({},opts,{headers}));
  if(!r.ok){let d={};try{d=await r.json()}catch(e){}throw new Error(d.detail||("HTTP "+r.status));}
  return r.json();
}

let toastTimer=null;
function toast(msg,actLabel,actFn,ms){
  const t=document.getElementById("toast");document.getElementById("toastMsg").textContent=msg;
  const b=document.getElementById("toastAct");
  if(actLabel){b.textContent=actLabel;b.style.display="";b.onclick=()=>{actFn&&actFn();hideToast();};}else b.style.display="none";
  t.classList.add("show");clearTimeout(toastTimer);toastTimer=setTimeout(hideToast,ms||3000);
}
function hideToast(){document.getElementById("toast").classList.remove("show");}

/* ── accent theme ── */
function applyAccent(name){
  const a=ACCENTS[name]||ACCENTS.green, r=document.documentElement.style;
  r.setProperty("--accent",a.a);r.setProperty("--accent-soft",a.s);r.setProperty("--accent-press",a.p);r.setProperty("--on-accent",a.o);
}
function curAccent(){try{return localStorage.getItem("dayon_accent")||"green";}catch(e){return "green";}}
function curTheme(){try{return localStorage.getItem("dayon_theme")||"dark";}catch(e){return "dark";}}
function applyTheme(t){
  const light=t==="light";
  document.body.classList.toggle("light",light);
  try{if(TG){const bg=light?"#EDF0F4":"#0A0B0E";TG.setBackgroundColor&&TG.setBackgroundColor(bg);TG.setHeaderColor&&TG.setHeaderColor(bg);}}catch(e){}
}

/* ════════ OVERVIEW ════════ */
function opRow(t){
  const inc=t.type==="income", col=inc?"var(--pos)":(EXP_COLOR[t.category]||"#8A90B0");
  const title=esc(t.merchant||t.description||t.category);
  return `<div class="lrow" data-tx="${t.id}">
    <div class="lic" style="background:${col}22;color:${col}">${t.emoji||"📦"}</div>
    <div class="lmid"><div class="t1">${title}</div><div class="t2">${dotDate(t.purchase_date)}</div></div>
    <div class="lamt ${inc?'pos':'dang'} num">${inc?'+':'−'}${amt(t.amount,CURCODE)}</div></div>`;
}
function obligationRow(p){
  const st=payStatus(p);
  return `<div class="lrow" data-pay="${p.id}">
    <div class="lic" style="background:var(--surface-3)">${p.emoji||"🔁"}</div>
    <div class="lmid"><div class="t1">${esc(p.name)}</div><div class="t2"><span class="minitag">${esc(p.category)}</span> ${PERIODS[p.period]||""} · ${dotDate(p.next_due_date)}</div></div>
    <div class="lamt num"><span class="dang">${amt(p.amount,p.currency)}</span><span class="badge" style="color:${st.col}">${st.txt}</span></div></div>`;
}
function renderOverview(d){
  OVERVIEW=d; CURCODE=d.currency||"UZS";
  document.getElementById("opsChip").textContent="📊 "+(d.month_count||0);
  const balTxt=BAL_HIDDEN?"••••••":num(d.balance,CURCODE);
  const warn=d.warning?`<button id="balWarn" title="Бюджет превышен">!</button>`:"";
  let html=`
  <div class="balance">
    <div class="acts">${warn}<button id="balEye">${BAL_HIDDEN?eyeOff():eyeOn()}</button></div>
    <div class="lbl">Баланс</div>
    <div class="big num" id="balBig">${balTxt}</div>
    <div class="cur">${CURCODE}</div>
  </div>
  <div class="stats">
    <div class="st"><div class="k">Доходы</div><div class="v pos num">${amt(d.month_income,CURCODE)}</div></div>
    <div class="st"><div class="k">Расходы</div><div class="v dang num">${amt(d.month_expense,CURCODE)}</div></div>
    <div class="st"><div class="k">Ср. в день</div><div class="v num">${money2(d.avg_day,CURCODE)}</div></div>
  </div>
  <div class="sechd"><div class="t">Последние операции</div><div class="more" data-go="reports">Все ›</div></div>`;
  if(d.recent&&d.recent.length) html+=`<div class="list">${d.recent.map(opRow).join("")}</div>`;
  else html+=`<div class="emptycard"><div class="empty"><span class="e">🧾</span>Пока нет операций. Добавьте первую через ＋</div></div>`;
  html+=`<div class="sechd"><div class="t">Обязательства</div><div class="more" data-go="payments">Все ›</div></div>`;
  if(d.obligations&&d.obligations.length) html+=`<div class="list">${d.obligations.map(obligationRow).join("")}</div>`;
  else html+=`<div class="emptycard"><div class="empty"><span class="e">🔁</span>Регулярных платежей нет</div></div>`;
  const body=document.getElementById("ovBody");body.innerHTML=html;
  document.getElementById("balEye").onclick=()=>{BAL_HIDDEN=!BAL_HIDDEN;document.getElementById("balBig").textContent=BAL_HIDDEN?"••••••":num(d.balance,CURCODE);document.getElementById("balEye").innerHTML=BAL_HIDDEN?eyeOff():eyeOn();haptic("sel");};
  const bw=document.getElementById("balWarn");if(bw)bw.onclick=()=>toast("Расходы превысили месячный бюджет");
  body.querySelectorAll("[data-go]").forEach(e=>e.onclick=()=>switchTab(e.dataset.go));
  body.querySelectorAll("[data-pay]").forEach(e=>e.onclick=async()=>{const id=e.dataset.pay;switchTab("payments");if(!PAY_LOADED)await loadPayments();const p=PAYMENTS.find(x=>String(x.id)===String(id));if(p)openPayment(p);});
}
function eyeOn(){return `<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M1 12s4-7 11-7 11 7 11 7-4 7-11 7S1 12 1 12z"/><circle cx="12" cy="12" r="3"/></svg>`;}
function eyeOff(){return `<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M17.94 17.94A10 10 0 0 1 12 20c-7 0-11-8-11-8a18 18 0 0 1 5.06-5.94M9.9 4.24A9 9 0 0 1 12 4c7 0 11 8 11 8a18 18 0 0 1-2.16 3.19M1 1l22 22"/></svg>`;}

async function loadOverview(){
  try{const d=await api("/api/overview");renderOverview(d);}
  catch(e){if(String(e.message).includes("401")||!INIT)showGate();else document.getElementById("ovBody").innerHTML=`<div class="empty">Ошибка загрузки</div>`;}
}

/* ════════ REPORTS ════════ */
const REP_TABS=[["today","Сегодня"],["week","Неделя"],["month","Месяц"],["year","Год"],["custom","Период"]];
function renderRepBanner(){
  if(dismissed("rep"))return;
  document.getElementById("repBanner").innerHTML=`<div class="banner"><div class="bic">i</div><div class="btx">Ваши доходы и расходы по периодам — сегодня, неделя, месяц, год или произвольный диапазон.</div><div class="bx" data-dismiss="rep">×</div></div>`;
  bindDismiss();
}
function renderRepSegs(){
  document.getElementById("repSegs").innerHTML=REP_TABS.map(([k,t])=>`<div class="segc ${RTAB===k?'on':''}" data-r="${k}">${t}</div>`).join("");
  document.querySelectorAll("#repSegs .segc").forEach(s=>s.onclick=()=>{RTAB=s.dataset.r;haptic("sel");renderRepSegs();renderRepCustom();loadReport();});
}
function renderRepCustom(){
  const box=document.getElementById("repCustom");
  if(RTAB!=="custom"){box.innerHTML="";return;}
  box.innerHTML=`<div class="field row2" style="margin-bottom:14px"><input id="rFrom" type="date" value="${RFROM||monthKey(0)+'-01'}"><input id="rTo" type="date" value="${RTO||todayISO()}"></div>`;
  document.getElementById("rFrom").onchange=e=>{RFROM=e.target.value;loadReport();};
  document.getElementById("rTo").onchange=e=>{RTO=e.target.value;loadReport();};
}
function renderReport(d){
  CURCODE=d.currency||CURCODE;
  let html=`<div class="stats">
    <div class="st"><div class="k">Доход</div><div class="v pos num">+${amt(d.income,CURCODE)}</div></div>
    <div class="st"><div class="k">Расход</div><div class="v dang num">−${amt(d.expense,CURCODE)}</div></div>
    <div class="st"><div class="k">Остаток</div><div class="v num">${amt(d.balance,CURCODE)}</div></div>
  </div>`;
  if(d.categories&&d.categories.length){
    html+=`<div class="sechd"><div class="t">Расходы по категориям</div></div><div class="list" style="padding:14px 14px 6px">`;
    html+=d.categories.map(c=>{const col=EXP_COLOR[c.category]||"#8A90B0";return `<div style="margin-bottom:11px"><div style="display:flex;justify-content:space-between;font-size:12.5px;margin-bottom:5px"><span>${c.emoji} ${esc(c.category)}</span><b class="num">${amt(c.total,CURCODE)}</b></div><div style="height:8px;border-radius:5px;background:var(--surface-3);overflow:hidden"><div style="height:100%;width:${Math.max(2,c.share)}%;background:${col};border-radius:5px"></div></div></div>`;}).join("");
    html+=`</div>`;
  }
  html+=`<div class="sechd"><div class="t">Операции</div><div class="more" style="color:var(--muted)">${d.count}</div></div>`;

function renderEvBanner(){

  bindDismiss();
}
function renderCalendar(){
  const base=new Date();base.setDate(1);base.setMonth(base.getMonth()+CAL_OFFSET);
  const y=base.getFullYear(),m=base.getMonth();
  const first=(new Date(y,m,1).getDay()+6)%7, days=new Date(y,m+1,0).getDate();
  const todayStr=todayISO();
  const counts={};EVENTS.forEach(e=>{counts[e.date]=(counts[e.date]||0)+1;});
  let cells="";
  for(let i=0;i<first;i++)cells+=`<div class="calday blank"></div>`;
  for(let dd=1;dd<=days;dd++){
    const iso=y+"-"+String(m+1).padStart(2,"0")+"-"+String(dd).padStart(2,"0");
    const cl=["calday"];if(iso===todayStr)cl.push("today");if(iso===SEL_DATE)cl.push("sel");
    cells+=`<div class="${cl.join(' ')}" data-d="${iso}">${dd}${counts[iso]?'<span class="dot"></span>':''}</div>`;
  }
  document.getElementById("calBox").innerHTML=`<div class="cal">
    <div class="calhd"><button class="calnav" id="calPrev">‹</button><b>${MONTHS[m]} ${y}</b><button class="calnav" id="calNext">›</button></div>
    <div class="calgrid">${WD.map(w=>`<div class="calwd">${w}</div>`).join("")}${cells}</div></div>`;
  document.getElementById("calPrev").onclick=()=>{CAL_OFFSET--;SEL_DATE=null;loadEvents();};
  document.getElementById("calNext").onclick=()=>{CAL_OFFSET++;SEL_DATE=null;loadEvents();};
  document.querySelectorAll("#calBox .calday[data-d]").forEach(c=>c.onclick=()=>{SEL_DATE=c.dataset.d;haptic("sel");renderCalendar();renderEvDay();});
  renderEvDay();
}
function renderEvDay(){
  const box=document.getElementById("evDay");
  if(!SEL_DATE){box.innerHTML="";return;}
  const d=new Date(SEL_DATE+"T00:00:00");
  const hdr=(WD_FULL[d.getDay()]+", "+d.getDate()+" "+MONTHS_GEN[d.getMonth()]).toUpperCase();
  const list=EVENTS.filter(e=>e.date===SEL_DATE).sort((a,b)=>(a.time||"99").localeCompare(b.time||"99"));
  let html=`<div class="dayhd">${hdr}</div>`;
  if(list.length) html+=`<div class="list">${list.map(e=>`<div class="lrow" data-ev="${e.id}"><div class="lic" style="background:var(--accent-soft);color:var(--accent)">${e.emoji||"📌"}</div><div class="lmid"><div class="t1">${esc(e.title)}</div><div class="t2">${e.time?'🕒 '+e.time:'весь день'}${e.note?' · '+esc(e.note):''}</div></div></div>`).join("")}</div>`;
  else html+=`<div class="emptycard"><div class="empty"><span class="e">📅</span>Нет событий на этот день<br><button class="cta" id="evAddDay">＋ Добавить событие</button></div></div>`;
  box.innerHTML=html;
  const a=document.getElementById("evAddDay");if(a)a.onclick=()=>openEvent();
  box.querySelectorAll("[data-ev]").forEach(el=>el.onclick=()=>openEvent(list.find(x=>String(x.id)===String(el.dataset.ev))));
}
async function loadEvents(){
  EV_LOADED=true;
  try{const r=await api("/api/events?month="+monthKey(CAL_OFFSET));EVENTS=r.events||[];}catch(e){EVENTS=[];}
  if(SEL_DATE===null&&CAL_OFFSET===0)SEL_DATE=todayISO();

function payStatus(p){
  if(p.status==="paused")return {txt:"НА ПАУЗЕ",col:"var(--muted)"};
  if(p.overdue)return {txt:"ПРОСРОЧЕНО",col:"var(--dang)"};
  if(p.paid)return {txt:"ОПЛАЧЕНО",col:"var(--pos)"};
  return {txt:"НЕ ОПЛАЧЕНО",col:"var(--dang)"};
}
function renderPayBanner(){
  if(dismissed("pay"))return;
  document.getElementById("payBanner").innerHTML=`<div class="banner"><div class="bic">i</div><div class="btx">Регулярные платежи — подписки, аренда, кредиты, коммунальные услуги. Поставьте на паузу или отметьте оплату в одно касание.</div><div class="bx" data-dismiss="pay">×</div></div>`;
  bindDismiss();
}
function payRow(p){
  const st=payStatus(p);
  return `<div class="lrow" data-pay="${p.id}">

    <div class="lamt num"><span class="dang">${amt(p.amount,p.currency)}</span><span class="badge" style="color:${st.col}">${st.txt}</span></div></div>`;

function renderPayments(){

  document.getElementById("paySummary").innerHTML=`<div class="stats">
    <div class="st"><div class="k">Кол-во</div><div class="v num">${s.count}</div></div>
    <div class="st"><div class="k">Всего в мес.</div><div class="v dang num">${amt(s.monthly_total,s.currency)}</div></div>
    <div class="st"><div class="k">След. платёж</div><div class="v pos">${s.next_due?dotDate(s.next_due):"—"}</div></div>
  </div>`;
  document.getElementById("paySegs").innerHTML=[["all","Все"],["active","Активные"],["paused","На паузе"]].map(([k,t])=>`<div class="segc ${PAY_FILTER===k?'on':''}" data-f="${k}">${t}</div>`).join("");
  document.querySelectorAll("#paySegs .segc").forEach(s=>s.onclick=()=>{PAY_FILTER=s.dataset.f;haptic("sel");renderPayments();});
  let list=PAYMENTS.slice();

  else if(PAY_FILTER==="paused")list=list.filter(p=>p.status==="paused");
  const body=document.getElementById("payBody");
  if(!list.length){body.innerHTML=`<div class="emptycard"><div class="empty"><span class="e">🔁</span>${PAYMENTS.length?'Ничего не найдено':'Нет регулярных платежей'}<br><button class="cta" data-add="payment">＋ Добавить платёж</button></div></div>`;
    body.querySelectorAll("[data-add]").forEach(b=>b.onclick=()=>openPayment());return;}
  body.innerHTML=`<div class="list">${list.map(payRow).join("")}</div>`;
  body.querySelectorAll("[data-pay]").forEach(e=>e.onclick=()=>openPayment(PAYMENTS.find(p=>String(p.id)===String(e.dataset.pay))));

/* ════════ TASKS ════════ */
function renderTkBanner(){
  if(dismissed("tk"))return;
  document.getElementById("tkBanner").innerHTML=`<div class="banner"><div class="bic">i</div><div class="btx">Планируйте задачи с приоритетом, сроком, тегами и папками. Фильтруйте по статусу, чтобы сосредоточиться на главном.</div><div class="bx" data-dismiss="tk">×</div></div>`;
  bindDismiss();
}
function renderTasks(){
  document.getElementById("tkSummary").innerHTML=`<div class="stats">
    <div class="st"><div class="k">Активные</div><div class="v pos num">${TCOUNTS.active||0}</div></div>
    <div class="st"><div class="k">Выполнено</div><div class="v num">${TCOUNTS.done||0}</div></div>
    <div class="st"><div class="k">Отменено</div><div class="v num">${TCOUNTS.cancelled||0}</div></div>
  </div>`;
  const st=[["all","Все",TASKS.length],["active","Активные",TCOUNTS.active||0],["done","Выполнено",TCOUNTS.done||0],["cancelled","Отменено",TCOUNTS.cancelled||0]];
  document.getElementById("tkStatusSegs").innerHTML=st.map(([k,t,n])=>`<div class="segc ${TSTATUS===k?'on':''}" data-s="${k}">${t}${n?` <span class="cnt">${n}</span>`:''}</div>`).join("");
  document.querySelectorAll("#tkStatusSegs .segc").forEach(s=>s.onclick=()=>{TSTATUS=s.dataset.s;haptic("sel");renderTasks();});
  const pr=[["all","Все",null]].concat(Object.entries(PRIO).map(([k,v])=>[k,v.t,v.c]));
  document.getElementById("tkPrioSegs").innerHTML=pr.map(([k,t,c])=>`<div class="segc ${TPRIO===k?'on':''}" data-p="${k}">${c?`<span class="pd" style="background:${c}"></span>`:''}${t}</div>`).join("");
  document.querySelectorAll("#tkPrioSegs .segc").forEach(s=>s.onclick=()=>{TPRIO=s.dataset.p;haptic("sel");renderTasks();});
  let list=TASKS.slice();
  if(TSTATUS!=="all")list=list.filter(t=>t.status===TSTATUS);
  if(TPRIO!=="all")list=list.filter(t=>t.priority===TPRIO);
  const body=document.getElementById("tkBody");
  if(!list.length){body.innerHTML=`<div class="emptycard"><div class="empty"><span class="e">✅</span>${TASKS.length?'Ничего не найдено':'Задач пока нет'}<br><button class="cta" data-add="task">＋ Новая задача</button></div></div>`;
    body.querySelectorAll("[data-add]").forEach(b=>b.onclick=()=>openTask());
    body.innerHTML+=`<div class="note">Задачи хранятся 2 месяца после завершения или отмены, после чего автоматически удаляются.</div>`;return;}
  body.innerHTML=list.map(taskCard).join("")+`<div class="note">Задачи хранятся 2 месяца после завершения или отмены, после чего автоматически удаляются.</div>`;
  body.querySelectorAll(".tk").forEach(card=>{
    const id=+card.dataset.id;
    card.querySelector(".tkbox").onclick=ev=>{ev.stopPropagation();toggleTask(id);};
    card.querySelector(".tkbody").onclick=()=>openTask(TASKS.find(t=>t.id===id));
  });
}
function taskCard(t){
  const done=t.status==="done", cancelled=t.status==="cancelled";
  const pr=t.priority&&PRIO[t.priority];
  const sub=[];
  sub.push(t.due_date?`📅 ${dotDate(t.due_date)}`:`Без срока`);
  if(cancelled)sub.unshift("✕ отменено");
  const tags=(t.tags||[]).map(tg=>`<span class="tag">${esc(tg)}</span>`).join("");
  return `<div class="tk" data-id="${t.id}">
    <div class="tkbox ${done?'done':''} ${t.priority==='critical'&&!done?'crit':''}">${done?'✓':''}</div>
    <div class="tkbody"><div class="tt ${done?'done':''}">${esc(t.title)}</div>
      <div class="tksub"><span>${sub.join(" · ")}</span>${tags}</div></div>
    ${pr&&!done?`<div class="pdot" style="background:${pr.c}"></div>`:''}</div>`;
}
async function toggleTask(id){
  const t=TASKS.find(x=>x.id===id);if(!t)return;
  const ns=t.status==="done"?"active":"done";
  t.status=ns;recountTasks();renderTasks();haptic(ns==="done"?"notif":"sel");
  try{await api("/api/tasks/"+id,{method:"PUT",body:{status:ns}});}catch(e){toast("Ошибка");loadTasks();}
}
function recountTasks(){TCOUNTS={active:0,done:0,cancelled:0};TASKS.forEach(t=>{TCOUNTS[t.status]=(TCOUNTS[t.status]||0)+1;});}
async function loadTasks(){
  TK_LOADED=true;
  try{const r=await api("/api/tasks");TASKS=r.tasks||[];FOLDERS=r.folders||[];TCOUNTS=r.counts||{active:0,done:0,cancelled:0};}catch(e){TASKS=[];FOLDERS=[];}
  renderTasks();
}

function monthDiff(iso){const d=new Date(iso+"T00:00:00");if(isNaN(d))return null;const n=new Date();return (d.getFullYear()-n.getFullYear())*12+(d.getMonth()-n.getMonth());}

function renderFolderSelect(sel){
  document.getElementById("taskFolder").innerHTML=`<option value="">📁 Без папки</option>`+FOLDERS.map(f=>`<option value="${f.id}" ${String(sel)===String(f.id)?'selected':''}>${f.emoji||"📁"} ${esc(f.name)}</option>`).join("");
}
function openTask(t){
  EDIT_TASK=t||null;SEL_PRIO=t?t.priority:null;
  openSheet("taskSheet");
  document.getElementById("taskTitle").textContent=t?"Изменить задачу":"Новая задача";
  document.getElementById("taskName").value=t?t.title:"";
  document.getElementById("taskDue").value=t&&t.due_date?t.due_date:"";
  document.getElementById("taskTags").value=t&&t.tags?t.tags.join(", "):"";
  renderFolderSelect(t?t.folder_id:"");
  renderTaskPrio();
  document.getElementById("taskSubmit").textContent=t?"Сохранить":"Создать";
  document.getElementById("taskEditBtns").style.display=t?"":"none";
  if(t)document.getElementById("taskCancel").textContent=t.status==="cancelled"?"↩︎ Вернуть":"✕ Отменить";
  updateTaskSubmit();
  if(!t)setTimeout(()=>document.getElementById("taskName").focus(),300);
}
function updateTaskSubmit(){document.getElementById("taskSubmit").disabled=!document.getElementById("taskName").value.trim();}
function taskTagsVal(){return document.getElementById("taskTags").value.split(",").map(s=>s.trim()).filter(Boolean);}
async function submitTask(){
  const title=document.getElementById("taskName").value.trim();if(!title)return;
  const fid=document.getElementById("taskFolder").value;
  const body={title,priority:SEL_PRIO||null,due_date:document.getElementById("taskDue").value||null,folder_id:fid?+fid:null,tags:taskTagsVal()};
  const btn=document.getElementById("taskSubmit");btn.disabled=true;
  try{
    if(EDIT_TASK)await api("/api/tasks/"+EDIT_TASK.id,{method:"PUT",body});
    else await api("/api/tasks",{method:"POST",body});
    haptic("notif");closeSheet("taskSheet");toast(EDIT_TASK?"Задача обновлена":"Задача создана ✅");await loadTasks();
  }catch(e){toast("Ошибка: "+e.message);}finally{btn.disabled=false;}
}
async function taskCancelToggle(){if(!EDIT_TASK)return;const ns=EDIT_TASK.status==="cancelled"?"active":"cancelled";try{await api("/api/tasks/"+EDIT_TASK.id,{method:"PUT",body:{status:ns}});haptic("sel");closeSheet("taskSheet");toast(ns==="cancelled"?"Отменено":"Возвращено");await loadTasks();}catch(e){toast("Ошибка");}}
async function taskDelete(){if(!EDIT_TASK)return;if(!confirm("Удалить эту задачу?"))return;try{await api("/api/tasks/"+EDIT_TASK.id,{method:"DELETE"});haptic("impact","medium");closeSheet("taskSheet");toast("Удалено");await loadTasks();}catch(e){toast("Ошибка");}}

/* ════════ FOLDERS ════════ */
function openFolders(){openSheet("folderSheet");renderFolderList();document.getElementById("folderName").value="";}
function renderFolderList(){

  box.querySelectorAll("[data-del]").forEach(b=>b.onclick=async()=>{if(!confirm("Удалить папку? Задачи останутся."))return;try{await api("/api/task-folders/"+b.dataset.del,{method:"DELETE"});haptic("impact","medium");await loadTasks();renderFolderList();}catch(e){toast("Ошибка");}});

async function addFolder(){

  </div>

let SUB_OPEN=null;
function toggleSub(which){
  SUB_OPEN=SUB_OPEN===which?null:which;
  const box=document.getElementById("setSub");
  if(!SUB_OPEN){box.innerHTML="";return;}
  if(which==="notif"){
    const n=(ME&&ME.notify)||{};
    box.innerHTML=`<div class="setgrp"><div class="gh">Уведомления</div><div class="setrow" style="display:block;cursor:default">${NOTIFY_META.map(([k,t])=>`<div class="tg"><div class="lbl">${t}</div><div class="sw2 ${n[k]?'on':''}" data-k="${k}"></div></div>`).join("")}</div></div>`;
    box.querySelectorAll(".sw2").forEach(sw=>sw.onclick=async()=>{const k=sw.dataset.k,v=!(ME.notify&&ME.notify[k]);if(!ME.notify)ME.notify={};ME.notify[k]=v;sw.classList.toggle("on",v);haptic("sel");try{await api("/api/settings",{method:"POST",body:{settings:{[k]:v}}});}catch(e){ME.notify[k]=!v;sw.classList.toggle("on",!v);toast("Ошибка");}});
  }else if(which==="lang"){
    box.innerHTML=`<div class="setgrp"><div class="gh">Язык</div><div class="seg2" id="langSeg"><button data-v="ru" class="${LANG==='ru'?'on':''}">🇷🇺 Русский</button><button data-v="en" class="${LANG==='en'?'on':''}">🇬🇧 English</button></div></div>`;
    box.querySelectorAll("#langSeg button").forEach(b=>b.onclick=async()=>{LANG=b.dataset.v;haptic("sel");try{await api("/api/language",{method:"POST",body:{language:LANG}});}catch(e){}SUB_OPEN=null;renderSettings();});
  }else if(which==="cur"){
    const list=(ME&&ME.currencies)||[];
    box.innerHTML=`<div class="setgrp"><div class="gh">Валюта</div><div class="curgrid">${list.map(c=>`<div class="curchip ${c.code===CURCODE?'on':''}" data-c="${c.code}"><span class="fl">${c.flag}</span>${c.code}</div>`).join("")}</div></div>`;
    box.querySelectorAll(".curchip").forEach(ch=>ch.onclick=async()=>{const code=ch.dataset.c;if(code===CURCODE)return;haptic("sel");try{await api("/api/currency",{method:"POST",body:{currency:code}});CURCODE=code;if(ME)ME.currency=code;SUB_OPEN=null;renderSettings();loadOverview();}catch(e){toast("Ошибка");}});
  }else if(which==="priv"){
    box.innerHTML=`<div class="setgrp"><div class="privtext privext">Приложение хранит ваши данные в защищённой базе с построчной изоляцией доступа (RLS). Аутентификация выполняется через подпись Telegram. Вы в любой момент можете выгрузить или удалить свои данные ниже.</div></div>`;
  }
}
async function exportData(){
  try{const d=await api("/api/export");const blob=new Blob([JSON.stringify(d,null,2)],{type:"application/json"});const a=document.createElement("a");a.href=URL.createObjectURL(blob);a.download="finances-export.json";a.click();haptic("notif");toast("Данные выгружены");}
  catch(e){toast("Ошибка экспорта");}

async function wipeData(){
  if(!confirm("Удалить ВСЕ данные (операции, платежи, события, задачи, цели, долги)? Аккаунт останется."))return;
  try{await api("/api/wipe",{method:"POST"});haptic("notif","warning");toast("Все данные удалены");
    EVENTS=[];PAYMENTS=[];TASKS=[];FOLDERS=[];closeSheet("setSheet");loadOverview();EV_LOADED=PAY_LOADED=TK_LOADED=false;switchTab("overview");}

async function deleteAccount(){
  if(!confirm("Удалить аккаунт и ВСЕ данные навсегда? Это необратимо."))return;
  if(!confirm("Точно удалить аккаунт? Отменить нельзя."))return;

}

/* ════════ sheets / nav ════════ */
function openSheet(id){document.getElementById(id).classList.add("open");haptic("impact","light");if(TG&&TG.BackButton)TG.BackButton.show();}
function closeSheet(id){document.getElementById(id).classList.remove("open");if(TG&&TG.BackButton)TG.BackButton.hide();}
function closeAllSheets(){document.querySelectorAll(".sheetwrap").forEach(s=>s.classList.remove("open"));if(TG&&TG.BackButton)TG.BackButton.hide();}

function switchTab(name){
  document.querySelectorAll(".screen").forEach(s=>s.classList.remove("active"));
  document.getElementById("s-"+name).classList.add("active");
  document.querySelectorAll(".tab").forEach(t=>t.classList.toggle("on",t.dataset.tab===name));
  haptic("sel");window.scrollTo(0,0);
  if(name==="reports"){renderRepBanner();renderRepSegs();renderRepCustom();loadReport();}
  if(name==="events"){renderEvBanner();if(!EV_LOADED)loadEvents();else renderCalendar();}
  if(name==="payments"){renderPayBanner();if(!PAY_LOADED)loadPayments();else renderPayments();}
  if(name==="tasks"){renderTkBanner();if(!TK_LOADED)loadTasks();else renderTasks();}
  if(name==="overview")loadOverview();
}
function showGate(){document.getElementById("app").style.display="none";document.querySelector(".tabbar").style.display="none";document.getElementById("gate").style.display="flex";}

function openAdd(kind){
  if(kind==="tx")openTx();
  else if(kind==="event")openEvent();
  else if(kind==="payment")openPayment();
  else if(kind==="task")openTask();
}

/* ════════ swipe between tabs ════════ */
const TAB_ORDER=["overview","reports","events","payments","tasks"];
function bindSwipe(){
  const app=document.getElementById("app");let sx=0,sy=0,st=0,go=false;
  app.addEventListener("touchstart",e=>{
    if(document.querySelector(".sheetwrap.open")){go=false;return;}
    if(e.target.closest(".segs,.swatches,input,textarea,select")){go=false;return;}
    const t=e.touches[0];sx=t.clientX;sy=t.clientY;st=Date.now();go=true;
  },{passive:true});
  app.addEventListener("touchend",e=>{
    if(!go)return;go=false;
    const t=e.changedTouches[0],dx=t.clientX-sx,dy=t.clientY-sy;
    if(Date.now()-st>700)return;                                  // too slow → not a swipe
    if(Math.abs(dx)<60||Math.abs(dx)<Math.abs(dy)*1.6)return;     // must be a clear horizontal swipe
    const cur=((document.querySelector(".screen.active")||{}).id||"s-overview").replace("s-","");
    const i=TAB_ORDER.indexOf(cur), ni=dx<0?i+1:i-1;             // swipe left → next, right → prev
    if(ni<0||ni>=TAB_ORDER.length)return;
    switchTab(TAB_ORDER[ni]);haptic("sel");
  },{passive:true});
}

/* ════════ init ════════ */
async function loadMe(){
  try{ME=await api("/api/me");if(ME.language)LANG=ME.language;if(ME.currency)CURCODE=ME.currency;}

}
async function loadCats(){try{CATS=await api("/api/categories");}catch(e){}}

function bindUI(){
  if(TG&&TG.BackButton)TG.BackButton.onClick(closeAllSheets);   // register once; openSheet only toggles visibility

  // task sheet
  document.getElementById("taskSubmit").onclick=submitTask;

  document.getElementById("taskDelete").onclick=taskDelete;
  document.getElementById("taskName").addEventListener("input",updateTaskSubmit);
  // folders
  document.getElementById("folderAdd").onclick=addFolder;
}
function fmtAmtInput(id,curGetter,after){
  const e=document.getElementById(id);if(!e)return;
  e.addEventListener("input",ev=>{
    const m=curMeta(curGetter());
    if(m.dec>0){
      let v=ev.target.value.replace(/[^\d.]/g,"");
      const i=v.indexOf(".");
      if(i>=0)v=v.slice(0,i+1)+v.slice(i+1).replace(/\./g,"");   // keep only the first dot
      const dot=v.indexOf(".");
      const intp=(dot>=0?v.slice(0,dot):v).replace(/^0+(?=\d)/,"");
      const frac=dot>=0?v.slice(dot+1,dot+1+m.dec):null;
      ev.target.value=intp?(fmtNum(+intp,0,m.grp)+(dot>=0?"."+frac:"")):(dot>=0?"0."+frac:"");
    }else{
      const v=ev.target.value.replace(/[^\d]/g,"");
      ev.target.value=v?fmtNum(+v,0,m.grp):"";
    }
    after&&after();
  });
}

async function init(){
  applyAccent(curAccent());
  document.body.classList.toggle("light",curTheme()==="light");
  if(TG){try{TG.ready();TG.expand();}catch(e){}}
  applyTheme(curTheme());
  if(!INIT){showGate();return;}
  bindUI();bindSwipe();
  const ok=await loadMe();if(!ok)return;
  if(ME&&ME.first_name)document.getElementById("ovHello").textContent="Привет, "+ME.first_name;
  await loadCats();
  loadOverview();
}
init();
